
services:
  nginx:
    container_name: nginx
    image: nginx
    ports:
      - 80:80
    volumes:
      - ./nginx/vhost.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/public_html
    networks:
      - network
    depends_on:
      - php
      - postgres


  postgres:
    image: postgres:18.4-alpine
    container_name: psgr
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - network
    ports:
        - 5432:5432


  adminer:
    image: adminer
    container_name: adminer
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - network
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  
  php:
    container_name: php
    build: .
    image: php
    volumes:
      - .:/var/www/public_html
    command: sh -c "composer install --no-interaction && php-fpm"
    depends_on:
      - postgres
    networks:
      - network


networks:
  network:
    driver: bridge

volumes:
  postgres-data:

